<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sohbet</title>

<style>
body{
font-family:Arial,sans-serif;
margin:20px;
}

#chat{
height:400px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.bot{
background:#f3f4f6;
padding:10px;
margin:8px 0;
border-radius:8px;
max-width:80%;
}

.user{
background:#dbeafe;
padding:10px;
margin:8px 0 8px auto;
border-radius:8px;
max-width:80%;
text-align:right;
}

.row{
display:flex;
gap:8px;
}

input{
flex:1;
padding:10px;
}

button{
padding:10px 15px;
}
</style>

</head>
<body>

<div id="chat"></div>

<div class="row">
<input id="input" placeholder="Yanıtınızı yazın">
<button id="send">Gönder</button>
</div>

<script>

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const button = document.getElementById("send");

const params = new URLSearchParams(window.location.search);

const participantId = params.get("pid");
const outparty = params.get("outparty");

let history = [];
let turn = 0;
const MAX_TURNS = 3;

function add(role,text){

const div=document.createElement("div");

div.className=role;

div.innerText=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

function finish(){

add(
"bot",
"Teşekkürler. Sohbet tamamlandı. Lütfen ankete devam edin."
);

window.parent.postMessage(
{
type:"chatComplete",
history
},
"*"
);

input.disabled=true;
button.disabled=true;

}

async function sendMessage(){

const text=input.value.trim();

if(!text) return;

add("user",text);

history.push({
role:"user",
content:text
});

input.value="";

const response = await fetch("/api/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

message:text,
history,
outparty,
turn

})

});

const data = await response.json();

add("bot",data.reply);

history.push({
role:"assistant",
content:data.reply
});

turn++;

if(turn>=MAX_TURNS){

finish();

}

}

button.onclick=sendMessage;

input.addEventListener("keydown",e=>{

if(e.key==="Enter"){

sendMessage();

}

});

add(
"bot",
"Merhaba. Kısa bir sohbet yapacağız. Başlamak için düşüncelerinizi paylaşabilirsiniz."
);

</script>

</body>
</html>
